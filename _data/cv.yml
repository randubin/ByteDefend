- title: Research Interests
  type: nested_list
  contents:
    - title: AI & ML Security
      items:
        - Detection of malware hidden in neural network model weights
        - Moving Target Defense for deployed AI models (AI-MTD)
        - Content Disarm & Reconstruction for AI model files (SafePickle, NeuPerm)
    - title: Encrypted Network Traffic Analysis
      items:
        - Traffic classification without decryption (TLS, HTTPS, QUIC)
        - Post-quantum encryption traffic identification (PQClass)
        - Malware C2 traffic detection in encrypted channels
    - title: API Security
      items:
        - Few-shot and retrieval-based API injection detection
        - Anomaly detection with limited labelled data
    - title: Content Disarm & Reconstruction (CDR)
      items:
        - Zero-trust file sanitisation for PDF, RTF, and image formats
        - CDR methodology for AI model file formats

