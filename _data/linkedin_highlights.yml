- title: "Model X-Ray: Finding Malware Hidden in AI Weight Files"
  date: "Sep 2024"
  excerpt: >
    Attackers are increasingly hiding malware inside the weight tensors of open-source AI models.
    Model X-Ray uses few-shot learning to scan model weights for hidden payloads — a scalable
    approach for securing AI model registries and distribution pipelines.
  url: "https://arxiv.org/abs/2409.19310"
  tags: ["AI Security", "Few-Shot Learning", "Model Weights"]
  icon: "🔍"

