- title: "NeuPerm: Defeating Malware Hidden in Neural Network Weights"
  date: "Oct 2025"
  excerpt: >
    Attackers can embed malicious payloads directly into a model's weight matrices. NeuPerm
    leverages the natural permutation symmetry of neural networks to disrupt such hidden payloads —
    a fundamentally new defence primitive for AI model security.
  url: "https://arxiv.org/abs/2510.20367"
  tags: ["AI Security", "Neural Networks", "Malware"]
  icon: "🔬"

- title: "AI-MTD: Moving Target Defense for Zero-Trust AI Model Security"
  date: "Sep 2025"
  excerpt: >
    Accepted at FedCSIS 2025. AI-MTD introduces a moving-target defence layer for deployed AI
    models: the model's internal structure is continuously mutated at runtime, making it a
    moving target that thwarts adversarial probing and model-theft attacks.
  url: "https://doi.org/10.15439/2025F9981"
  tags: ["Zero Trust", "Moving Target Defense", "AI Security"]
  icon: "🛡️"

- title: "ICC 2025: PQClass — Classifying Post-Quantum Encryption in Internet Traffic"
  date: "Jun 2025"
  excerpt: >
    With post-quantum cryptographic algorithms (CRYSTALS-Kyber, Dilithium) being deployed across
    the internet, traffic classifiers must evolve. PQClass is the first ML framework targeting
    encrypted traffic carrying PQC applications — presented at IEEE ICC 2025.
  url: "https://doi.org/10.1109/ICC52391.2025.11160818"
  tags: ["Post-Quantum", "Encrypted Traffic", "Classification"]
  icon: "🔐"

- title: "API Injection Detection via Few-Shot Retrieval — Computers & Security"
  date: "Jan 2025"
  excerpt: >
    Published in Computers &amp; Security: a classification-by-retrieval framework that detects
    API injection attacks with only a handful of labelled examples per attack class. Works in
    real-world settings where labelled attack data is scarce.
  url: "https://doi.org/10.1016/j.cose.2024.104249"
